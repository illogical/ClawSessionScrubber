<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawSessionScrubber</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__claw" aria-hidden="true">🦞</span>
      <h1 class="app-header__title">ClawSessionScrubber</h1>
    </div>
    <div class="app-header__actions">
      <span id="status-banner" class="status-banner" role="status" aria-live="polite"></span>
    </div>
  </header>

  <div class="app-layout">
    <!-- Sidebar: session file selector -->
    <aside class="sidebar" aria-label="Session files">
      <div class="sidebar__header">
        <span class="sidebar__label">Sessions</span>
        <button id="btn-refresh" class="icon-btn" title="Refresh sessions" aria-label="Refresh sessions">↺</button>
      </div>
      <div class="sidebar__search">
        <input id="session-search" type="search" placeholder="Filter sessions…" aria-label="Filter sessions" autocomplete="off" />
      </div>
      <ul id="session-list" class="session-list" role="listbox" aria-label="Session files">
        <li class="session-list__empty">Loading sessions…</li>
      </ul>
    </aside>

    <!-- Main panel -->
    <main class="main-panel" aria-label="Session viewer">
      <!-- Toolbar -->
      <div class="toolbar" id="toolbar" role="toolbar" aria-label="Message actions">
        <div class="toolbar__empty" id="toolbar-empty">
          <p>Select a session to begin reviewing.</p>
        </div>
        <div class="toolbar__controls" id="toolbar-controls" hidden>
          <div class="toolbar__row">
            <button id="btn-select-thinking" class="btn btn--secondary">Select thinking &amp; tool calls</button>
            <button id="btn-select-all" class="btn btn--secondary">Select all</button>
            <button id="btn-deselect-all" class="btn btn--secondary">Deselect all</button>
          </div>
          <div class="toolbar__row">
            <button id="btn-delete-selected" class="btn btn--danger" disabled>Delete selected (<span id="selected-count">0</span>)</button>
            <button id="btn-delete-unimportant" class="btn btn--danger">Delete unimportant</button>
            <button id="btn-export-memory" class="btn btn--accent">Export important to memory</button>
          </div>
          <div class="toolbar__stats" id="toolbar-stats" aria-live="polite">
            <span id="stat-important">0 important</span>
            <span class="toolbar__sep">/</span>
            <span id="stat-total">0 total</span>
          </div>
        </div>
      </div>

      <!-- Message feed -->
      <div class="message-feed-wrapper">
        <ul id="message-feed" class="message-feed" role="list" aria-label="Messages" aria-live="polite">
        </ul>
      </div>
    </main>
  </div>

  <!-- Message detail modal -->
  <div id="message-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__panel">
      <div class="modal__header">
        <h2 id="modal-title" class="modal__title">Message Detail</h2>
        <button id="modal-close" class="icon-btn modal__close" aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal__body"></div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
